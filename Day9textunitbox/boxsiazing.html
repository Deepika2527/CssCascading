<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        .container{
            border: 1px solid black;
            height: 300px;
            width: 300px;
            background-color: lightcoral;
            padding: 10px;
            border: 2px solid;
            box-sizing: border-box;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
         hello
    </div>
    
</body>
</html>
